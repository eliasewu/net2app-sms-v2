version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: net2app-postgres
    environment:
      POSTGRES_DB: net2app_sms
      POSTGRES_USER: net2app
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password_change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U net2app -d net2app_sms"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: net2app-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_password_change_me}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # RabbitMQ Message Queue
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: net2app-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: net2app
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-rabbitmq_password_change_me}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # Backend API
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: net2app-api
    environment:
      DATABASE_URL: postgresql+asyncpg://net2app:${DB_PASSWORD:-secure_password_change_me}@postgres:5432/net2app_sms
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password_change_me}@redis:6379/0
      RABBITMQ_URL: amqp://net2app:${RABBITMQ_PASSWORD:-rabbitmq_password_change_me}@rabbitmq:5672/
      SECRET_KEY: ${SECRET_KEY:-your_secret_key_here_change_me}
      SMPP_HOST: 0.0.0.0
      SMPP_PORT: 2775
    volumes:
      - ./backend:/app
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  # SMPP Server
  smpp-server:
    build:
      context: ./backend
      dockerfile: Dockerfile.smpp
    container_name: net2app-smpp
    environment:
      DATABASE_URL: postgresql+asyncpg://net2app:${DB_PASSWORD:-secure_password_change_me}@postgres:5432/net2app_sms
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password_change_me}@redis:6379/0
      RABBITMQ_URL: amqp://net2app:${RABBITMQ_PASSWORD:-rabbitmq_password_change_me}@rabbitmq:5672/
      SMPP_HOST: 0.0.0.0
      SMPP_PORT: 2775
    ports:
      - "2775:2775"
    depends_on:
      - api
    restart: unless-stopped

  # Celery Worker
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: net2app-celery
    command: celery -A app.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://net2app:${DB_PASSWORD:-secure_password_change_me}@postgres:5432/net2app_sms
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password_change_me}@redis:6379/0
      RABBITMQ_URL: amqp://net2app:${RABBITMQ_PASSWORD:-rabbitmq_password_change_me}@rabbitmq:5672/
    volumes:
      - ./backend:/app
    depends_on:
      - api
      - rabbitmq
    restart: unless-stopped

  # Celery Beat (Scheduler)
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: net2app-celery-beat
    command: celery -A app.celery_app beat --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://net2app:${DB_PASSWORD:-secure_password_change_me}@postgres:5432/net2app_sms
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password_change_me}@redis:6379/0
      RABBITMQ_URL: amqp://net2app:${RABBITMQ_PASSWORD:-rabbitmq_password_change_me}@rabbitmq:5672/
    volumes:
      - ./backend:/app
    depends_on:
      - api
      - rabbitmq
    restart: unless-stopped

  # Kannel SMS Gateway
  kannel:
    image: ficusio/kannel
    container_name: net2app-kannel
    volumes:
      - ./kannel/kannel.conf:/etc/kannel/kannel.conf
      - kannel_logs:/var/log/kannel
    ports:
      - "2776:2775"     # SMSC port
      - "13013:13013"   # HTTP SMS port
      - "13000:13000"   # Admin port
    depends_on:
      - api
    restart: unless-stopped

  # Frontend (Nginx)
  frontend:
    image: nginx:alpine
    container_name: net2app-frontend
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  kannel_logs:

networks:
  default:
    name: net2app-network
