#═══════════════════════════════════════════════════════════════════
# net2app SMS Hub — SQLbox Configuration
# Watches send_sms table → pushes to Kannel Bearbox
#
# Flow: FastAPI/Bridge INSERTs into send_sms → SQLbox reads
#       → pushes to Bearbox → Bearbox routes to SMSC by smsc-id
#═══════════════════════════════════════════════════════════════════

group = sqlbox
id = sqlbox
bearerbox-host = 127.0.0.1
bearerbox-port = 13001
smsbox-port = 13005

# PostgreSQL connection
sql-type = pgsql
sql-host = localhost
sql-port = 5432
sql-username = net2app
sql-password = YOUR_DB_PASSWORD
sql-database = net2app_sms

# Table mappings
sql-insert-table = sent_sms
sql-log-table = sent_sms
save-msg-fields = all

log-file = /var/log/kannel/sqlbox.log
log-level = 1
