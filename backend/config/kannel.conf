#═══════════════════════════════════════════════════════════════════
# net2app SMS Hub — Kannel 1.4.5 Configuration
# Bearbox + Smsbox + DLR Callback
#
# Flow: SQLbox INSERT → Bearbox → SMSC → DLR → FastAPI callback
#═══════════════════════════════════════════════════════════════════

#───── CORE (Bearbox) ─────
group = core
admin-port = 13000
admin-password = kannel-admin-password
admin-deny-ip = "*.*.*.*"
admin-allow-ip = "127.0.0.1"
smsbox-port = 13001
box-deny-ip = "*.*.*.*"
box-allow-ip = "127.0.0.1"
log-file = "/var/log/kannel/bearerbox.log"
log-level = 1
access-log = "/var/log/kannel/access.log"
store-location = "/var/spool/kannel/store"
dlr-storage = internal

#───── SMSBOX ─────
group = smsbox
bearerbox-host = 127.0.0.1
sendsms-port = 13013
sendsms-chars = "0123456789 +-"
log-file = "/var/log/kannel/smsbox.log"
log-level = 1
access-log = "/var/log/kannel/smsbox-access.log"

#───── SENDSMS USER ─────
group = sendsms-user
username = net2app
password = sms-password
concatenation = true
max-messages = 10

#───── DLR CALLBACK → FastAPI ─────
# When Kannel receives a DLR from upstream SMSC, it calls this URL
# FastAPI parses the callback and updates sms_logs table
group = sms-service
keyword = default
catch-all = yes
get-url = "http://127.0.0.1:8000/api/sms/dlr?msgid=%I&status=%d&dlr_time=%t&src=%p&dst=%P&smsc=%i&dlr_mask=%n"

#═══════════════════════════════════════════════════════════════════
# SMSC CONNECTIONS (Suppliers)
# Each group = smsc block is one supplier gateway
# smsc-id must match the smsc_id column in send_sms table
#═══════════════════════════════════════════════════════════════════

# ─── Example: SMPP Supplier ─────
# group = smsc
# smsc = smpp
# smsc-id = SP_AllSMS_Global
# host = 5.78.72.23
# port = 2775
# receive-port = 0
# smsc-username = net2app
# smsc-password = yourpassword
# system-type = ""
# transceiver-mode = true
# enquire-link-interval = 30
# reconnect-delay = 10
# throughput = 100
# msg-id-type = 0x01

# ─── Example: HTTP Supplier ─────
# group = smsc
# smsc = http
# smsc-id = SP_BDTel_HTTP
# system-type = kannel
# port = 0
# send-url = "http://api.bdtel.com/sms/send?user=net2app&pass=xxx&to=%P&from=%p&text=%b"
# dlr-url = "http://127.0.0.1:13013/cgi-bin/sendsms"
# throughput = 50
