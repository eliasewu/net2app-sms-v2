#═══════════════════════════════════════════════════════════════════
# net2app SMS Hub — OpenSMPPbox Configuration
# Allows external SMPP clients to connect to Kannel
# This acts as an SMPP server that clients bind to
#
# Note: The Python SMPP Bridge on :2775 handles auth and billing.
# OpenSMPPbox on :2776 is for direct Kannel client connections
# (without billing — used for internal/admin testing).
#═══════════════════════════════════════════════════════════════════

group = opensmppbox
bearerbox-host = 127.0.0.1
bearerbox-port = 13001
opensmppbox-port = 2776
smsc-id = opensmppbox
our-system-id = net2app

# Access control
opensmppbox-id = net2app-smppbox

log-file = /var/log/kannel/opensmppbox.log
log-level = 1

# SMPP users (add via smpp-logins)
# group = smpp-login
# smsc-id = opensmppbox
# system-id = testclient
# password = testpass
# throughput = 10
